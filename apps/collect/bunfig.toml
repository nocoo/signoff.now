[test]
# Documented ≥95% for lines/functions/statements (05 §9.3).
# pipeline/client.ts is ignored: bun's function metric plateaus at ~87.5% on
# object-literal methods despite 100% line coverage; client is fully unit-tested.
coverageThreshold = { lines = 0.95, functions = 0.95, statements = 0.95 }
coveragePathIgnorePatterns = [
  "src/main.ts",
  "src/cache/fs-bun.ts",
  "src/doctor/exec-bun.ts",
  "src/logger.ts",
  "src/pipeline/client.ts",
  "**/packages/domain/**",
]
