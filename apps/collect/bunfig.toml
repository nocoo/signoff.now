[test]
# 05 §9.3: Bun metrics only — lines / functions / statements ≥95% (no branches).
# Exception: pipeline/client.ts excluded (object-literal methods under-count funcs
# in bun despite 100% lines + full unit tests). See docs/05 §9.3.
coverageThreshold = { lines = 0.95, functions = 0.95, statements = 0.95 }
coveragePathIgnorePatterns = [
  "src/main.ts",
  "src/cache/fs-bun.ts",
  "src/doctor/exec-bun.ts",
  "src/logger.ts",
  "src/pipeline/client.ts",
  "**/packages/domain/**",
]
