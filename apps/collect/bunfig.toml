[test]
# Lines ≥95% for all collect modules.
# Functions floor 0.85: pipeline client return-object methods sit at 87.5% under
# bun's function metric despite 100% line coverage (domain gated separately).
coverageThreshold = { lines = 0.95, functions = 0.85 }
coveragePathIgnorePatterns = [
  "src/main.ts",
  "src/cache/fs-bun.ts",
  "src/doctor/exec-bun.ts",
  "src/logger.ts",
  "**/packages/domain/**",
]
