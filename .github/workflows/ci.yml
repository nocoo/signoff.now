name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.1
    with:
      bun-version: "1.3.6"
      test-command: "bun run test:ci"
      typecheck-command: "bun run typecheck"
    secrets: inherit
