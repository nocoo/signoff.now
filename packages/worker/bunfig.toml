[test]
# Full lib + middleware + routes gate (only index/types/jose network path excluded)
coverageThreshold = { lines = 0.95, functions = 0.95, statements = 0.95 }
coveragePathIgnorePatterns = [
  "src/index.ts",
  "src/types.ts",
  "src/test/**",
  # Real JWKS network I/O only — injectable verifier covers access-auth
  "src/middleware/access-jose.ts",
]
